server:
  port: 8080

spring:
  application:
    name: hrms-backend
  datasource:
    url: jdbc:mysql://localhost:3306/hrms?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

hrms:
  jwt:
    secret: "ChangeThisToAVeryLongSecretKeyForProductionUseOnly123456"
    expire-hours: 168
  upload-dir: ${user.home}/hrms-uploads
