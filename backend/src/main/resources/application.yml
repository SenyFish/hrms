server:
  port: 8080

spring:
  application:
    name: hrms-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/hrms?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

hrms:
  jwt:
    secret: ${JWT_SECRET:ChangeThisToAVeryLongSecretKeyForProductionUseOnly123456}
    expire-hours: ${JWT_EXPIRE_HOURS:168}
  upload-dir: ${UPLOAD_DIR:${user.home}/hrms-uploads}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
